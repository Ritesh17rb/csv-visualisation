<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Catalog — CSV Explorer</title>
  <link rel="stylesheet" href="assets/catalog.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header>
  <div>
    <h1>Data <span class="accent">Catalog</span></h1>
    <p class="subtitle">Browse, search, and explore every row across all datasets</p>
  </div>
  <div class="header-right">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Explorer
    </a>
  </div>
</header>

<!-- ── Dataset cards ───────────────────────────────────── -->
<section class="cards-section" id="cardsSection">
  <div class="cards-grid" id="cardsGrid"></div>
</section>

<!-- ── Data viewer ─────────────────────────────────────── -->
<section class="viewer" id="viewer" style="display:none">
  <!-- Viewer header -->
  <div class="viewer-head">
    <button class="viewer-back" id="viewerBack">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All Datasets
    </button>
    <div class="viewer-title-area">
      <h2 class="viewer-title" id="viewerTitle"></h2>
      <div class="viewer-stats" id="viewerStats"></div>
    </div>
    <div class="viewer-tools">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="Search rows..." autocomplete="off">
        <span class="search-count" id="searchCount"></span>
      </div>
      <div class="view-toggle">
        <button class="vt-btn active" data-view="table" title="Table view">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="3" rx="0.5" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="7" width="14" height="3" rx="0.5" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="12" width="14" height="2" rx="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="vt-btn" data-view="cards" title="Card view">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Column filter chips -->
  <div class="col-chips" id="colChips"></div>

  <!-- Table view -->
  <div class="table-wrap" id="tableWrap">
    <table id="dataTable">
      <thead><tr id="dataHead"></tr></thead>
      <tbody id="dataBody"></tbody>
    </table>
  </div>

  <!-- Card view -->
  <div class="data-cards" id="dataCards" style="display:none"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>
</section>

<!-- ── Loading ─────────────────────────────────────────── -->
<div class="page-loader" id="pageLoader">
  <div class="loader">
    <div class="loader-ring">
      <svg viewBox="0 0 80 80">
        <defs>
          <linearGradient id="loader-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <circle class="loader-track" cx="40" cy="40" r="32"/>
        <circle class="loader-arc" cx="40" cy="40" r="32"/>
      </svg>
      <div class="loader-orb"></div>
    </div>
    <div class="loader-text">Loading catalog</div>
    <div class="loader-sub">Fetching dataset information&hellip;</div>
  </div>
</div>

<!-- ── Lightbox ────────────────────────────────────────── -->
<div class="lightbox" id="lightbox">
  <img id="lbImg" src="" alt="">
  <div class="lb-label" id="lbLabel"></div>
</div>

<script src="assets/catalog.js"></script>
</body>
</html>
